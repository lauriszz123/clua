name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lua-tests:
    name: Lua tests (${{ matrix.lua-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lua-version: ["5.1", "5.4", "luajit-2.1"]
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: ${{ matrix.lua-version }}

      - name: Install LuaRocks
        uses: leafo/gh-actions-luarocks@v4

      - name: Validate and install rockspec
        run: |
          luarocks lint clua-scm-1.rockspec
          luarocks make clua-scm-1.rockspec

      - name: Run Lua test suite
        run: lua tests/lua/run_all.lua

  vscode-extension-tests:
    name: VS Code extension tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-clua-syntax
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: vscode-clua-syntax/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run extension tests
        run: npm test

  vsix-package:
    name: VSIX packaging smoke test
    runs-on: ubuntu-latest
    needs: vscode-extension-tests
    defaults:
      run:
        working-directory: vscode-clua-syntax
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode-clua-syntax/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npm run package:out

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: clua-syntax-vsix
          path: vscode-clua-syntax/clua-syntax.vsix
          if-no-files-found: error
